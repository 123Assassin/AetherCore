services:
  postgres:
    image: postgres:16-alpine
    container_name: aethercore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aether_db}
    volumes:
      - /home/ubuntu/data/pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aethercore_net

  redis:
    image: redis:7-alpine
    container_name: aethercore-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    command:
      ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:-redis_secret}']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD:-redis_secret}" ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aethercore_net

  db-init:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/db-init/Dockerfile
    image: aethercore-db-init:local
    container_name: aethercore-db-init
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_secret}@postgres:5432/${POSTGRES_DB:-aether_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      WEB_USER: ${WEB_USER:-teacher}
      WEB_USER_EMAIL: ${WEB_USER_EMAIL:-teacher@aethercore.local}
      WEB_USER_PASSWORD: ${WEB_USER_PASSWORD:-teacher123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aethercore_net

  server:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: aethercore-server:local
    container_name: aethercore-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_secret}@postgres:5432/${POSTGRES_DB:-aether_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      APP_HTTP_URL: http://server:7001
      SERVER_PORT: 7001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SYSTEM_AUDIT_LOG_CLEANUP_CRON: ${SYSTEM_AUDIT_LOG_CLEANUP_CRON:-0 3 * * *}
      AETHERCORE_ENGINE_API_KEY_SECRET: ${AETHERCORE_ENGINE_API_KEY_SECRET:-aethercore_dev_engine_api_key_secret_change_me}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_REDIRECT_URI: ${WECHAT_REDIRECT_URI:-http://localhost:3000/auth/wechat/callback}
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '7001'
    networks:
      - aethercore_net

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ''
        NEXT_PUBLIC_SIMULATION_APP_PORT: ${NEXT_PUBLIC_SIMULATION_APP_PORT:-80}
    image: aethercore-web:local
    container_name: aethercore-web
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://server:7001
      NEXT_PUBLIC_API_URL: ''
      NEXT_PUBLIC_SIMULATION_APP_PORT: ${NEXT_PUBLIC_SIMULATION_APP_PORT:-80}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - server
    networks:
      - aethercore_net

  admin:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ''
    image: aethercore-admin:local
    container_name: aethercore-admin
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://server:7001
      NEXT_PUBLIC_API_URL: ''
    ports:
      - '${ADMIN_PORT:-3001}:3001'
    depends_on:
      - server
    networks:
      - aethercore_net

networks:
  aethercore_net:
    name: aethercore_net
    driver: bridge
